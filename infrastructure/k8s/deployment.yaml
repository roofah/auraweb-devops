apiVersion: apps/v1
kind: Deployment
metadata:
  name: auraweb
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auraweb
  template:
    metadata:
      labels:
        app: auraweb
    spec:
      containers:
      - name: auraweb
        image: roofahmanahil/auraweb-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: auraweb-service
spec:
  type: NodePort
  selector:
    app: auraweb
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080